<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test 2</title>

<!--Page Setup-->


<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #16191d;
    color: white;
    font-family: Arial, sans-serif;
}

/*Navbar*/

nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    z-index: 1000;
    background: rgba(0,0,0,.3);
    backdrop-filter: blur(10px);
}

nav ul {
    display: flex;
    gap: 30px;
    list-style: none;
}

nav a {
    color: white;
    text-decoration: none;
} 

/*Scroll Creation*/

#scroll-section {
    height: 300vh;
}

#sticky-wrap {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/*Image Container*/

#image-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    border-radius: 0px;
    transition: border-radius .2s ease;
}

#image-container img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#img2 {
    opacity: 0;
}

</style>
</head>
<body>

<!--Navbar-->

<nav>
    <h2>Framework</h2>

    <ul>
        <li><a href="#">Products</a></li>
        <li><a href="#">Support</a></li>
        <li><a href="#">About</a></li>
        <li><a href="/Test 1.html">Test 1</a></li>
    </ul>
</nav>

<!--Image Setup-->

<section id="scroll-section">

    <div id="sticky-wrap">

        <div id="image-container">

            <img
                id="img1"
                src="FW 13 Wallpaper 4 (4K).jpg"
                alt="First image"
            >

            <img
                id="img2"
                src="FW 13 Wallpaper 5 (4K).jpg"
                alt="image trasnform"
            >

        </div>

    </div>

</section>

<script>

/*scroll*/

const section =
    document.getElementById("scroll-section");

const container =
    document.getElementById("image-container");

const img2 =
    document.getElementById("img2");

window.addEventListener("scroll", () => {

    const rect =
        section.getBoundingClientRect();

    const maxScroll =
        section.offsetHeight - window.innerHeight;

    const progress =
        Math.min(
            Math.max(-rect.top / maxScroll, 0),
            1
        );

    /*Size*/

    const width =
        100 - (70 * progress);

    const height =
        100 - (70 * progress);

    container.style.width =
        `${width}vw`;

    container.style.height =
        `${height}vh`;

    container.style.borderRadius =
        `${progress * 30}px`;

    /*Modify*/

    img2.style.opacity =
        progress;

});

</script>

</body>
</html>
